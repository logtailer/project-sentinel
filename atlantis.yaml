version: 3
automerge: false
delete_source_branch_on_merge: true

projects:
  - name: aws-bootstrap
    dir: infra/aws/bootstrap
    workspace: default
    terraform_version: v1.9.x
    autoplan:
      when_modified: ["*.tf", "../modules/**/*.tf"]
      enabled: true
    apply_requirements: [approved, mergeable]
    workflow: sentinel-workflow

  - name: aws-dev
    dir: infra/aws/environments/dev
    workspace: default
    terraform_version: v1.9.x
    autoplan:
      when_modified: ["*.tf", "../../modules/**/*.tf"]
      enabled: true
    apply_requirements: [approved, mergeable]
    workflow: sentinel-workflow

  - name: aws-prod
    dir: infra/aws/environments/prod
    workspace: default
    terraform_version: v1.9.x
    autoplan:
      when_modified: ["*.tf", "../../modules/**/*.tf"]
      enabled: true
    apply_requirements: [approved, mergeable, undiverged]
    workflow: sentinel-workflow

  - name: azure-bootstrap
    dir: infra/azure/bootstrap
    workspace: default
    terraform_version: v1.9.x
    autoplan:
      when_modified: ["*.tf", "../modules/**/*.tf"]
      enabled: true
    apply_requirements: [approved, mergeable]
    workflow: sentinel-workflow

  - name: azure-dev
    dir: infra/azure/environments/dev
    workspace: default
    terraform_version: v1.9.x
    autoplan:
      when_modified: ["*.tf", "../../modules/**/*.tf"]
      enabled: true
    apply_requirements: [approved, mergeable]
    workflow: sentinel-workflow

  - name: azure-prod
    dir: infra/azure/environments/prod
    workspace: default
    terraform_version: v1.9.x
    autoplan:
      when_modified: ["*.tf", "../../modules/**/*.tf"]
      enabled: true
    apply_requirements: [approved, mergeable, undiverged]
    workflow: sentinel-workflow

workflows:
  sentinel-workflow:
    plan:
      steps:
        - init:
            extra_args: ["-backend=false"]
        - run: terraform fmt -check -recursive .
        - run: checkov --config-file $(git rev-parse --show-toplevel)/.checkov.yml --quiet
        - plan
    apply:
      steps:
        - apply
