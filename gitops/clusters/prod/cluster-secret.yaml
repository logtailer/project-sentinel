# ArgoCD cluster registration secret for sentinel-prod.
# The server URL and CA data are populated by ESO from Secrets Manager
# after the prod EKS cluster is created — never committed with real values.
apiVersion: v1
kind: Secret
metadata:
  name: sentinel-prod
  namespace: argocd
  labels:
    argocd.argoproj.io/secret-type: cluster
    environment: sentinel
type: Opaque
stringData:
  name: sentinel-prod
  server: https://PROD_CLUSTER_ENDPOINT
  config: |
    {
      "execProviderConfig": {
        "command": "aws",
        "args": ["eks", "get-token", "--cluster-name", "sentinel-prod"],
        "apiVersion": "client.authentication.k8s.io/v1beta1"
      },
      "tlsClientConfig": {
        "insecure": false,
        "caData": "PROD_CA_DATA_BASE64"
      }
    }
