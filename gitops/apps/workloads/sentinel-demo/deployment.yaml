apiVersion: apps/v1
kind: Deployment
metadata:
  name: sentinel-demo
  namespace: sentinel-demo
  labels:
    app: sentinel-demo
    team: platform
    environment: dev
spec:
  replicas: 2
  selector:
    matchLabels:
      app: sentinel-demo
  template:
    metadata:
      labels:
        app: sentinel-demo
        team: platform
        environment: dev
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "5678"
    spec:
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app: sentinel-demo
      containers:
        - name: echo
          image: hashicorp/http-echo:latest
          args:
            - "-text=sentinel-demo: ok"
            - "-listen=:5678"
          ports:
            - name: http
              containerPort: 5678
          resources:
            requests:
              cpu: 100m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 1000
            capabilities:
              drop: [ALL]
      securityContext:
        seccompProfile:
          type: RuntimeDefault
