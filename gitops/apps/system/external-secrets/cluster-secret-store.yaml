apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: aws-secrets-manager
spec:
  provider:
    aws:
      service: SecretsManager
      region: us-east-1
      # ESO uses Pod Identity — the controller pod's service account is bound
      # to the ESO IAM role via aws_eks_pod_identity_association in Terraform.
      auth:
        jwt:
          serviceAccountRef:
            name: external-secrets
            namespace: external-secrets
