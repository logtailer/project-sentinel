# Pulls the GitHub OAuth client secret from Secrets Manager and creates the
# Kubernetes secret that ArgoCD's Dex SSO configuration references.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: argocd-github-oauth
  namespace: argocd
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: argocd-github-oauth
    creationPolicy: Owner
  data:
    - secretKey: clientSecret
      remoteRef:
        key: sentinel/dev/github-oauth
        property: client_secret
