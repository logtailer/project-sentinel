apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-node-health
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  eks-node-health.json: |
    {
      "title": "EKS Node Health — sentinel-dev",
      "uid": "sentinel-node-health",
      "schemaVersion": 38,
      "refresh": "30s",
      "time": { "from": "now-3h", "to": "now" },
      "templating": {
        "list": [
          {
            "name": "node",
            "type": "query",
            "datasource": "Prometheus",
            "query": "label_values(kube_node_info, node)",
            "refresh": 2
          }
        ]
      },
      "panels": [
        {
          "id": 1,
          "title": "Node Ready Status",
          "type": "stat",
          "gridPos": { "x": 0, "y": 0, "w": 6, "h": 4 },
          "targets": [
            {
              "expr": "sum(kube_node_status_condition{condition=\"Ready\",status=\"true\"})",
              "legendFormat": "Ready nodes"
            }
          ],
          "options": {
            "colorMode": "background",
            "thresholds": {
              "steps": [
                { "color": "red", "value": 0 },
                { "color": "yellow", "value": 1 },
                { "color": "green", "value": 2 }
              ]
            }
          }
        },
        {
          "id": 2,
          "title": "Node CPU Usage %",
          "type": "timeseries",
          "gridPos": { "x": 6, "y": 0, "w": 18, "h": 8 },
          "targets": [
            {
              "expr": "(1 - avg by(node) (rate(node_cpu_seconds_total{mode=\"idle\"}[5m]))) * 100",
              "legendFormat": "{{ node }}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "percent",
              "thresholds": {
                "steps": [
                  { "color": "green", "value": 0 },
                  { "color": "yellow", "value": 70 },
                  { "color": "red", "value": 85 }
                ]
              }
            }
          }
        },
        {
          "id": 3,
          "title": "Node Memory Available %",
          "type": "timeseries",
          "gridPos": { "x": 0, "y": 8, "w": 12, "h": 8 },
          "targets": [
            {
              "expr": "(node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes) * 100",
              "legendFormat": "{{ instance }}"
            }
          ],
          "fieldConfig": {
            "defaults": { "unit": "percent" }
          }
        },
        {
          "id": 4,
          "title": "Karpenter Nodes Launched (24h)",
          "type": "stat",
          "gridPos": { "x": 12, "y": 8, "w": 6, "h": 4 },
          "targets": [
            {
              "expr": "increase(karpenter_nodes_created_total[24h])",
              "legendFormat": "Launched"
            }
          ]
        },
        {
          "id": 5,
          "title": "Karpenter Nodes Terminated (24h)",
          "type": "stat",
          "gridPos": { "x": 18, "y": 8, "w": 6, "h": 4 },
          "targets": [
            {
              "expr": "increase(karpenter_nodes_terminated_total[24h])",
              "legendFormat": "Terminated"
            }
          ]
        }
      ]
    }
