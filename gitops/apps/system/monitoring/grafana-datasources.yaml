apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources-extra
  namespace: monitoring
  labels:
    grafana_datasource: "1"
data:
  datasources.yaml: |
    apiVersion: 1
    datasources:
      - name: Loki
        type: loki
        url: http://loki.monitoring.svc.cluster.local:3100
        access: proxy
        isDefault: false
        jsonData:
          maxLines: 1000
          derivedFields:
            - datasourceUid: Tempo
              matcherRegex: "traceID=(\\w+)"
              name: TraceID
              url: "$${__value.raw}"

      - name: Tempo
        type: tempo
        url: http://tempo.monitoring.svc.cluster.local:3100
        access: proxy
        isDefault: false
        uid: Tempo
        jsonData:
          nodeGraph:
            enabled: true
          lokiSearch:
            datasourceUid: Loki
