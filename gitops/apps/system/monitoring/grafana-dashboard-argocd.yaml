apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-argocd
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  argocd-sync-status.json: |
    {
      "title": "ArgoCD Application Sync Status",
      "uid": "sentinel-argocd-sync",
      "schemaVersion": 38,
      "refresh": "60s",
      "panels": [
        {
          "id": 1,
          "title": "Applications Synced",
          "type": "stat",
          "gridPos": { "x": 0, "y": 0, "w": 6, "h": 4 },
          "targets": [
            {
              "expr": "sum(argocd_app_info{sync_status=\"Synced\"})",
              "legendFormat": "Synced"
            }
          ],
          "options": { "colorMode": "background" },
          "fieldConfig": {
            "defaults": {
              "thresholds": {
                "steps": [
                  { "color": "red", "value": 0 },
                  { "color": "green", "value": 1 }
                ]
              }
            }
          }
        },
        {
          "id": 2,
          "title": "Applications OutOfSync",
          "type": "stat",
          "gridPos": { "x": 6, "y": 0, "w": 6, "h": 4 },
          "targets": [
            {
              "expr": "sum(argocd_app_info{sync_status=\"OutOfSync\"})",
              "legendFormat": "OutOfSync"
            }
          ],
          "options": { "colorMode": "background" },
          "fieldConfig": {
            "defaults": {
              "thresholds": {
                "steps": [
                  { "color": "green", "value": 0 },
                  { "color": "red", "value": 1 }
                ]
              }
            }
          }
        },
        {
          "id": 3,
          "title": "Sync Wave Progress",
          "type": "timeseries",
          "gridPos": { "x": 0, "y": 4, "w": 24, "h": 8 },
          "targets": [
            {
              "expr": "argocd_app_sync_total",
              "legendFormat": "{{ name }} ({{ phase }})"
            }
          ]
        }
      ]
    }
