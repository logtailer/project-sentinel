# NodePool defines WHAT Karpenter can provision — instance families, capacity types,
# limits, and disruption budgets. Graviton (arm64) is included for cost savings on
# stateless workloads; the default NodePool does not schedule system-tainted pods.
apiVersion: karpenter.sh/v1
kind: NodePool
metadata:
  name: default
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  template:
    spec:
      nodeClassRef:
        group: karpenter.k8s.aws
        kind: EC2NodeClass
        name: default

      requirements:
        - key: karpenter.sh/capacity-type
          operator: In
          values: ["spot", "on-demand"]
        - key: kubernetes.io/arch
          operator: In
          values: ["amd64", "arm64"]
        - key: karpenter.k8s.aws/instance-category
          operator: In
          values: ["c", "m", "r"]
        - key: karpenter.k8s.aws/instance-generation
          operator: Gt
          values: ["4"]

  # Hard ceiling — prevents runaway scaling from unbounded autoscaling bugs
  limits:
    cpu: "200"
    memory: 400Gi

  disruption:
    consolidationPolicy: WhenEmptyOrUnderutilized
    consolidateAfter: 30s
    budgets:
      # Never disrupt more than 20% of nodes at once during consolidation
      - maxUnavailable: "20%"
