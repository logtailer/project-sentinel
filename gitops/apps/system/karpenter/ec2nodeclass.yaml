# EC2NodeClass defines HOW Karpenter launches nodes — AMI, networking, storage.
# The amiSelectorTerms reference the EKS-optimised AL2 AMI for the cluster version.
# subnetSelectorTerms and securityGroupSelectorTerms use the karpenter.sh/discovery
# tag we added to the general node group subnets and security groups.
apiVersion: karpenter.k8s.aws/v1
kind: EC2NodeClass
metadata:
  name: default
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  amiFamily: AL2
  amiSelectorTerms:
    - alias: al2@latest

  # Subnets and security groups are discovered by the cluster tag set in Terraform
  subnetSelectorTerms:
    - tags:
        karpenter.sh/discovery: sentinel-dev

  securityGroupSelectorTerms:
    - tags:
        karpenter.sh/discovery: sentinel-dev

  # Instance profile created in infra/modules/eks/karpenter.tf
  instanceProfile: sentinel-dev-karpenter-node

  blockDeviceMappings:
    - deviceName: /dev/xvda
      ebs:
        volumeSize: 50Gi
        volumeType: gp3
        encrypted: true
