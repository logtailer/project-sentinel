# Sync wave 1 — after ESO (wave 0) so secrets are available before Karpenter starts.
# EC2NodeClass and NodePool in gitops/apps/system/karpenter/ use wave 2.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: karpenter
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
    argocd-image-updater.argoproj.io/image-list: karpenter=public.ecr.aws/karpenter/karpenter
    argocd-image-updater.argoproj.io/karpenter.update-strategy: semver
    argocd-image-updater.argoproj.io/karpenter.allow-tags: regexp:^1\.[0-9]+\.[0-9]+$
    argocd-image-updater.argoproj.io/write-back-method: git
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: public.ecr.aws/karpenter
    chart: karpenter
    targetRevision: "1.0.8"
    helm:
      releaseName: karpenter
      values: |
        settings:
          clusterName: sentinel-dev
          interruptionQueue: sentinel-dev-karpenter-interruption
        serviceAccount:
          name: karpenter
  destination:
    server: https://kubernetes.default.svc
    namespace: karpenter
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
