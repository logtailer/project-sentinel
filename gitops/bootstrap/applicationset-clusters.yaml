# Cluster generator ApplicationSet: deploys the monitoring stack to every
# cluster registered in ArgoCD. Each cluster gets its own values overlay from
# gitops/clusters/<cluster-name>/values-monitoring.yaml.
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: monitoring-per-cluster
  namespace: argocd
spec:
  generators:
    - clusters:
        selector:
          matchLabels:
            environment: sentinel
  template:
    metadata:
      name: "monitoring-{{name}}"
      namespace: argocd
      annotations:
        argocd.argoproj.io/sync-wave: "2"
      finalizers:
        - resources-finalizer.argocd.argoproj.io
    spec:
      project: default
      source:
        repoURL: https://prometheus-community.github.io/helm-charts
        chart: kube-prometheus-stack
        targetRevision: "58.7.2"
        helm:
          releaseName: kube-prometheus-stack
          valueFiles:
            - "$values/gitops/clusters/{{name}}/values-monitoring.yaml"
          parameters:
            - name: "kubecostProductConfigs.clusterName"
              value: "{{name}}"
      sources:
        - repoURL: https://github.com/logtailer/project-sentinel.git
          targetRevision: HEAD
          ref: values
      destination:
        server: "{{server}}"
        namespace: monitoring
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true
