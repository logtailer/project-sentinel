# Sync wave 2 — after Karpenter (wave 1) so the monitoring namespace exists
# and node capacity is available for Prometheus TSDB storage.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kube-prometheus-stack
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://prometheus-community.github.io/helm-charts
    chart: kube-prometheus-stack
    targetRevision: "58.7.2"
    helm:
      releaseName: kube-prometheus-stack
      values: |
        grafana:
          adminPassword: ""
          ingress:
            enabled: false
          persistence:
            enabled: true
            storageClassName: gp3
            size: 10Gi
        prometheus:
          prometheusSpec:
            retention: 30d
            storageSpec:
              volumeClaimTemplate:
                spec:
                  storageClassName: gp3
                  accessModes: [ReadWriteOnce]
                  resources:
                    requests:
                      storage: 50Gi
            ruleSelector:
              matchLabels:
                app: sentinel
        alertmanager:
          alertmanagerSpec:
            storage:
              volumeClaimTemplate:
                spec:
                  storageClassName: gp3
                  accessModes: [ReadWriteOnce]
                  resources:
                    requests:
                      storage: 5Gi
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
