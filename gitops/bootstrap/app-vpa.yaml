# VPA runs in recommendation mode only — it does not auto-update pod resources.
# Goldilocks reads VPA recommendations and surfaces them in its dashboard.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: vpa
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://charts.fairwinds.com/stable
    chart: vpa
    targetRevision: "4.4.6"
    helm:
      releaseName: vpa
      values: |
        recommender:
          enabled: true
        updater:
          enabled: false
        admissionController:
          enabled: false
  destination:
    server: https://kubernetes.default.svc
    namespace: vpa
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
