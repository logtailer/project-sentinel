name: Deploy

on:
  push:
    branches: [main]
    paths:
      - 'infra/aws/**'
      - 'infra/azure/**'
  workflow_dispatch:
    inputs:
      cloud:
        description: Cloud provider to deploy
        required: true
        type: choice
        options: [aws, azure, both]
      environment:
        description: Target environment
        required: true
        type: choice
        options: [dev, prod]
      action:
        description: Terraform action
        required: true
        default: apply
        type: choice
        options: [plan, apply]

concurrency:
  group: deploy-${{ github.ref }}-${{ inputs.cloud }}-${{ inputs.environment }}
  cancel-in-progress: false

env:
  TF_VERSION: "1.9.x"
  TF_INPUT: false

jobs:
  # ── detect which cloud's infra changed (push only) ──────────────────────────
  changes:
    name: Detect changed paths
    runs-on: ubuntu-latest
    outputs:
      aws: ${{ steps.filter.outputs.aws }}
      azure: ${{ steps.filter.outputs.azure }}
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            aws:
              - 'infra/aws/**'
            azure:
              - 'infra/azure/**'

  # ── AWS dev ─────────────────────────────────────────────────────────────────
  deploy-aws-dev:
    name: Deploy › AWS › dev
    needs: changes
    runs-on: ubuntu-latest
    environment: dev-aws
    if: |
      (github.event_name == 'push' && needs.changes.outputs.aws == 'true') ||
      (github.event_name == 'workflow_dispatch' &&
       (github.event.inputs.cloud == 'aws' || github.event.inputs.cloud == 'both') &&
       github.event.inputs.environment == 'dev')
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_DEV }}
          aws-region: us-east-1

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Init
        working-directory: infra/aws/environments/dev
        run: terraform init

      - name: Plan
        id: plan
        working-directory: infra/aws/environments/dev
        run: |
          terraform plan -out=tfplan -no-color 2>&1 | tee plan.txt
          echo "exit_code=${PIPESTATUS[0]}" >> "$GITHUB_OUTPUT"
        env:
          TF_VAR_admin_cidr: ${{ secrets.TF_AWS_ADMIN_CIDR }}
          TF_VAR_argocd_hostname: ${{ secrets.TF_ARGOCD_HOSTNAME }}
          TF_VAR_gitops_repo_url: ${{ vars.GITOPS_REPO_URL }}
          TF_VAR_github_org: ${{ vars.GITHUB_ORG }}
          TF_VAR_github_oauth_client_id: ${{ secrets.TF_GITHUB_OAUTH_CLIENT_ID }}

      - name: Plan summary
        working-directory: infra/aws/environments/dev
        run: |
          echo "### Terraform Plan — AWS dev" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          tail -20 plan.txt >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      - name: Apply
        if: |
          github.event_name == 'push' ||
          github.event.inputs.action == 'apply'
        working-directory: infra/aws/environments/dev
        run: terraform apply -auto-approve tfplan
        env:
          TF_VAR_admin_cidr: ${{ secrets.TF_AWS_ADMIN_CIDR }}
          TF_VAR_argocd_hostname: ${{ secrets.TF_ARGOCD_HOSTNAME }}
          TF_VAR_gitops_repo_url: ${{ vars.GITOPS_REPO_URL }}
          TF_VAR_github_org: ${{ vars.GITHUB_ORG }}
          TF_VAR_github_oauth_client_id: ${{ secrets.TF_GITHUB_OAUTH_CLIENT_ID }}

  # ── Azure dev ────────────────────────────────────────────────────────────────
  deploy-azure-dev:
    name: Deploy › Azure › dev
    needs: changes
    runs-on: ubuntu-latest
    environment: dev-azure
    if: |
      (github.event_name == 'push' && needs.changes.outputs.azure == 'true') ||
      (github.event_name == 'workflow_dispatch' &&
       (github.event.inputs.cloud == 'azure' || github.event.inputs.cloud == 'both') &&
       github.event.inputs.environment == 'dev')
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Init
        working-directory: infra/azure/environments/dev
        run: |
          terraform init \
            -backend-config="storage_account_name=${{ secrets.AZURE_STORAGE_ACCOUNT_NAME }}"

      - name: Plan
        id: plan
        working-directory: infra/azure/environments/dev
        run: |
          terraform plan -out=tfplan -no-color 2>&1 | tee plan.txt
          echo "exit_code=${PIPESTATUS[0]}" >> "$GITHUB_OUTPUT"
        env:
          TF_VAR_argocd_hostname: ${{ secrets.TF_ARGOCD_HOSTNAME }}
          TF_VAR_gitops_repo_url: ${{ vars.GITOPS_REPO_URL }}
          TF_VAR_storage_account_name: ${{ secrets.AZURE_STORAGE_ACCOUNT_NAME }}
          TF_VAR_storage_account_primary_access_key: ${{ secrets.AZURE_STORAGE_ACCOUNT_KEY }}
          TF_VAR_admin_group_object_ids: ${{ secrets.TF_AZURE_ADMIN_GROUP_IDS }}
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ARM_USE_OIDC: "true"

      - name: Plan summary
        working-directory: infra/azure/environments/dev
        run: |
          echo "### Terraform Plan — Azure dev" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          tail -20 plan.txt >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      - name: Apply
        if: |
          github.event_name == 'push' ||
          github.event.inputs.action == 'apply'
        working-directory: infra/azure/environments/dev
        run: terraform apply -auto-approve tfplan
        env:
          TF_VAR_argocd_hostname: ${{ secrets.TF_ARGOCD_HOSTNAME }}
          TF_VAR_gitops_repo_url: ${{ vars.GITOPS_REPO_URL }}
          TF_VAR_storage_account_name: ${{ secrets.AZURE_STORAGE_ACCOUNT_NAME }}
          TF_VAR_storage_account_primary_access_key: ${{ secrets.AZURE_STORAGE_ACCOUNT_KEY }}
          TF_VAR_admin_group_object_ids: ${{ secrets.TF_AZURE_ADMIN_GROUP_IDS }}
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ARM_USE_OIDC: "true"

  # ── AWS prod (manual only, requires approval) ─────────────────────────────
  deploy-aws-prod:
    name: Deploy › AWS › prod
    needs: deploy-aws-dev
    runs-on: ubuntu-latest
    environment: prod-aws
    if: |
      github.event_name == 'workflow_dispatch' &&
      (github.event.inputs.cloud == 'aws' || github.event.inputs.cloud == 'both') &&
      github.event.inputs.environment == 'prod'
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_PROD }}
          aws-region: us-east-1

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Init
        working-directory: infra/aws/environments/prod
        run: terraform init

      - name: Plan
        working-directory: infra/aws/environments/prod
        run: |
          terraform plan -out=tfplan -no-color 2>&1 | tee plan.txt
          echo "### Terraform Plan — AWS prod" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          tail -30 plan.txt >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
        env:
          TF_VAR_admin_cidr: ${{ secrets.TF_AWS_ADMIN_CIDR_PROD }}
          TF_VAR_argocd_hostname: ${{ secrets.TF_ARGOCD_HOSTNAME_PROD }}
          TF_VAR_gitops_repo_url: ${{ vars.GITOPS_REPO_URL }}
          TF_VAR_github_org: ${{ vars.GITHUB_ORG }}
          TF_VAR_github_oauth_client_id: ${{ secrets.TF_GITHUB_OAUTH_CLIENT_ID }}

      - name: Apply
        if: github.event.inputs.action == 'apply'
        working-directory: infra/aws/environments/prod
        run: terraform apply -auto-approve tfplan
        env:
          TF_VAR_admin_cidr: ${{ secrets.TF_AWS_ADMIN_CIDR_PROD }}
          TF_VAR_argocd_hostname: ${{ secrets.TF_ARGOCD_HOSTNAME_PROD }}
          TF_VAR_gitops_repo_url: ${{ vars.GITOPS_REPO_URL }}
          TF_VAR_github_org: ${{ vars.GITHUB_ORG }}
          TF_VAR_github_oauth_client_id: ${{ secrets.TF_GITHUB_OAUTH_CLIENT_ID }}

  # ── Azure prod (manual only, requires approval) ───────────────────────────
  deploy-azure-prod:
    name: Deploy › Azure › prod
    needs: deploy-azure-dev
    runs-on: ubuntu-latest
    environment: prod-azure
    if: |
      github.event_name == 'workflow_dispatch' &&
      (github.event.inputs.cloud == 'azure' || github.event.inputs.cloud == 'both') &&
      github.event.inputs.environment == 'prod'
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID_PROD }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Init
        working-directory: infra/azure/environments/prod
        run: |
          terraform init \
            -backend-config="storage_account_name=${{ secrets.AZURE_STORAGE_ACCOUNT_NAME }}"

      - name: Plan
        working-directory: infra/azure/environments/prod
        run: |
          terraform plan -out=tfplan -no-color 2>&1 | tee plan.txt
          echo "### Terraform Plan — Azure prod" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          tail -30 plan.txt >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
        env:
          TF_VAR_argocd_hostname: ${{ secrets.TF_ARGOCD_HOSTNAME_PROD }}
          TF_VAR_gitops_repo_url: ${{ vars.GITOPS_REPO_URL }}
          TF_VAR_storage_account_name: ${{ secrets.AZURE_STORAGE_ACCOUNT_NAME }}
          TF_VAR_storage_account_primary_access_key: ${{ secrets.AZURE_STORAGE_ACCOUNT_KEY_PROD }}
          TF_VAR_admin_group_object_ids: ${{ secrets.TF_AZURE_ADMIN_GROUP_IDS_PROD }}
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID_PROD }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ARM_USE_OIDC: "true"

      - name: Apply
        if: github.event.inputs.action == 'apply'
        working-directory: infra/azure/environments/prod
        run: terraform apply -auto-approve tfplan
        env:
          TF_VAR_argocd_hostname: ${{ secrets.TF_ARGOCD_HOSTNAME_PROD }}
          TF_VAR_gitops_repo_url: ${{ vars.GITOPS_REPO_URL }}
          TF_VAR_storage_account_name: ${{ secrets.AZURE_STORAGE_ACCOUNT_NAME }}
          TF_VAR_storage_account_primary_access_key: ${{ secrets.AZURE_STORAGE_ACCOUNT_KEY_PROD }}
          TF_VAR_admin_group_object_ids: ${{ secrets.TF_AZURE_ADMIN_GROUP_IDS_PROD }}
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID_PROD }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ARM_USE_OIDC: "true"
