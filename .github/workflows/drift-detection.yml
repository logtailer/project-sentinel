name: Drift Detection

on:
  schedule:
    # Run every weekday at 07:00 UTC before the team starts work
    - cron: "0 7 * * 1-5"
  workflow_dispatch:

jobs:
  detect-drift-aws:
    name: Terraform Drift — AWS ${{ matrix.environment }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        environment: [aws/environments/dev, aws/environments/prod]
    permissions:
      id-token: write
      contents: read
      issues: write

    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.x"

      - name: Init
        working-directory: infra/${{ matrix.environment }}
        run: terraform init

      - name: Detect drift
        id: plan
        working-directory: infra/${{ matrix.environment }}
        run: |
          terraform plan -detailed-exitcode -out=tfplan 2>&1 | tee plan.txt
          echo "exit_code=${PIPESTATUS[0]}" >> "$GITHUB_OUTPUT"
        continue-on-error: true

      - name: Open issue on drift
        if: steps.plan.outputs.exit_code == '2'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('infra/${{ matrix.environment }}/plan.txt', 'utf8');
            const truncated = plan.length > 3000 ? plan.slice(0, 3000) + '\n...(truncated)' : plan;
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[Drift] infra/${{ matrix.environment }} has drifted from state`,
              body: `## Terraform Drift Detected\n\n\`\`\`\n${truncated}\n\`\`\``,
              labels: ['drift', 'infrastructure']
            });

  detect-drift-azure:
    name: Terraform Drift — Azure ${{ matrix.environment }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        environment: [azure/environments/dev, azure/environments/prod]
    permissions:
      id-token: write
      contents: read
      issues: write

    steps:
      - uses: actions/checkout@v4

      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.x"

      - name: Init
        working-directory: infra/${{ matrix.environment }}
        run: terraform init

      - name: Detect drift
        id: plan
        working-directory: infra/${{ matrix.environment }}
        run: |
          terraform plan -detailed-exitcode -out=tfplan 2>&1 | tee plan.txt
          echo "exit_code=${PIPESTATUS[0]}" >> "$GITHUB_OUTPUT"
        continue-on-error: true

      - name: Open issue on drift
        if: steps.plan.outputs.exit_code == '2'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('infra/${{ matrix.environment }}/plan.txt', 'utf8');
            const truncated = plan.length > 3000 ? plan.slice(0, 3000) + '\n...(truncated)' : plan;
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[Drift] infra/${{ matrix.environment }} has drifted from state`,
              body: `## Terraform Drift Detected\n\n\`\`\`\n${truncated}\n\`\`\``,
              labels: ['drift', 'infrastructure']
            });
