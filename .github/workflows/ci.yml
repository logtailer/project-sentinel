name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  terraform-fmt:
    name: Terraform Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.x"

      - name: Check formatting
        run: terraform fmt -check -recursive infra/

  terraform-validate:
    name: Terraform Validate
    runs-on: ubuntu-latest
    strategy:
      matrix:
        environment: [bootstrap, environments/dev]
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.x"

      - name: Init (local backend)
        working-directory: infra/${{ matrix.environment }}
        run: terraform init -backend=false

      - name: Validate
        working-directory: infra/${{ matrix.environment }}
        run: terraform validate

  checkov:
    name: Checkov Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install checkov
        run: pip install checkov

      - name: Run checkov
        run: checkov --config-file .checkov.yml

  helm-lint:
    name: Helm Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: azure/setup-helm@v4
        with:
          version: "3.15.x"

      - name: Lint Helm values in bootstrap apps
        run: |
          for app in gitops/bootstrap/app-*.yaml; do
            echo "Checking $app"
            # Extract repoURL, chart, targetRevision and run helm lint
            repoURL=$(grep 'repoURL:' "$app" | head -1 | awk '{print $2}')
            chart=$(grep 'chart:' "$app" | head -1 | awk '{print $2}')
            version=$(grep 'targetRevision:' "$app" | head -1 | awk '{print $2}' | tr -d '"')
            if [[ "$repoURL" == http* ]]; then
              helm repo add "tmp-$chart" "$repoURL" --force-update 2>/dev/null || true
              helm lint "tmp-$chart/$chart" --version "$version" 2>/dev/null || true
            fi
          done

  kubeconform:
    name: Manifest Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install kubeconform
        run: |
          curl -sSL https://github.com/yannh/kubeconform/releases/latest/download/kubeconform-linux-amd64.tar.gz | tar xz
          sudo mv kubeconform /usr/local/bin/

      - name: Validate manifests
        run: |
          find gitops/ -name "*.yaml" | xargs kubeconform \
            -strict \
            -ignore-missing-schemas \
            -schema-location default \
            -schema-location 'https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/{{.Group}}/{{.ResourceKind}}_{{.ResourceAPIVersion}}.json'

  pytest:
    name: Lambda Unit Tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        package: [node_remediation, scaling_advisor]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        working-directory: lambda
        run: pip install -r tests/requirements-test.txt

      - name: Run tests
        working-directory: lambda
        run: pytest tests/test_${{ matrix.package }}.py -v
        env:
          AWS_DEFAULT_REGION: us-east-1
          AWS_ACCESS_KEY_ID: test
          AWS_SECRET_ACCESS_KEY: test
